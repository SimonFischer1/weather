<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simon Fischer Wetterportal</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050505;
    color:white;
}

header{
    position:relative;
    text-align:center;
    padding:20px;
    border-bottom:2px solid white;
}

.banner{
    font-size:48px;
    font-weight:bold;
}

.login{
    position:absolute;
    right:30px;
    top:30px;
    font-size:32px;
}

.weather-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    border-radius:10px;
    overflow:hidden;
}

.card h2{
    text-align:center;
    margin:15px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.section{
    padding:20px;
}

.big-box{
    background:#151515;
    padding:25px;
    border-radius:10px;
    text-align:center;
}

.big-button{
    background:#0066ff;
    color:white;
    border:none;
    padding:15px 25px;
    margin:10px;
    cursor:pointer;
    border-radius:8px;
    font-size:18px;
}

.big-button:hover{
    background:#0055d4;
}

.links{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.link-btn{
    background:#0080ff;
    color:white;
    text-decoration:none;
    padding:18px;
    text-align:center;
    border-radius:10px;
    font-weight:bold;
}

.link-btn:hover{
    background:#0066cc;
}

footer{
    text-align:center;
    padding:30px;
    border-top:2px solid white;
}

.love{
    font-size:24px;
}

.copy{
    margin-top:10px;
    color:#ccc;
}

@media(max-width:1000px){

.weather-grid{
    grid-template-columns:1fr;
}

.links{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="banner">
BANNER
</div>

<div class="login">
👤
</div>

</header>

<div class="weather-grid">

<div class="card">

<h2>🌧 Regenradar</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&level=surface&overlay=radar&menu=true&message=true&marker=true&calendar=now">
</iframe>

</div>

<div class="card">

<h2>💨 Windkarte</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&level=surface&overlay=wind&menu=true&message=true&marker=true&calendar=now">
</iframe>

</div>

<div class="card">

<h2>🌀 Hochs, Tiefs & Isobaren</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=5&level=surface&overlay=pressure&menu=true&message=true&marker=true">
</iframe>

</div>

</div>

<div class="section">

<div class="big-box">

<h2>🇩🇪 Deutscher Wetterdienst</h2>

<p>DWD-Bodenwetterkarten öffnen</p>

<button class="big-button"
onclick="window.open('https://www.dwd.de','_blank')">

DWD öffnen

</button>

</div>

</div>

<div class="section">

<div class="big-box">

<h2>🚢 AIS Schiffsverkehr</h2>

<p>Live Schiffsdaten öffnen</p>

<button class="big-button"
onclick="window.open('https://www.marinetraffic.com','_blank')">

MarineTraffic

</button>

<button class="big-button"
onclick="window.open('https://www.vesselfinder.com','_blank')">

VesselFinder

</button>

</div>

</div>

<div class="links">

<a class="link-btn" href="https://google.de">TEXT1</a>

<a class="link-btn" href="https://google.de">TEXT2</a>

<a class="link-btn" href="https://google.de">TEXT3</a>

<a class="link-btn" href="https://google.de">TEXT4</a>

<a class="link-btn" href="https://google.de">TEXT5</a>

<a class="link-btn" href="https://google.de">TEXT6</a>

</div>

<footer>

<div class="love">
Made with ❤️ by Simon Fischer
</div>

<div class="copy">
© 2026 Simon Fischer
</div>

</footer>

</body>
</html>
