<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Simon Fischer Wetterportal</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
    border-bottom:2px solid white;
}

.banner{
    font-size:40px;
    font-weight:bold;
}

.top-right{
    position:absolute;
    top:20px;
    right:20px;
    font-size:28px;
}

.weather{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:15px;
    padding:15px;
}

.box{
    background:#1b1b1b;
    border-radius:10px;
    overflow:hidden;
}

.box h2{
    text-align:center;
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.dwd{
    width:100%;
    height:500px;
    object-fit:contain;
    background:white;
}

.ais{
    padding:15px;
}

.ais iframe{
    height:700px;
}

.links{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:15px;
}

.btn{
    background:#0066ff;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.btn:hover{
    background:#0050c8;
}

footer{
    border-top:2px solid white;
    text-align:center;
    padding:20px;
}

@media(max-width:1000px){
    .weather{
        grid-template-columns:1fr;
    }

    .links{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<header>

<div class="banner">
BANNER
</div>

<div class="top-right">
👤
</div>

</header>

<div class="weather">

<div class="box">
<h2>🌧 Regenradar</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&overlay=radar&menu=true">
</iframe>

</div>

<div class="box">
<h2>💨 Windkarte</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&overlay=wind&menu=true">
</iframe>

</div>

<div class="box">
<h2>🇩🇪 DWD Bodenwetterkarte</h2>

<img
class="dwd"
src="https://www.dwd.de/DWD/wetter/wv_allg/deutschland/bwk_bodendruck_na_ana.png">
</div>

</div>

<div class="ais">

<h2 style="text-align:center;">🚢 AIS Schiffsverkehr</h2>

<iframe
src="https://www.vesselfinder.com/aismap">
</iframe>

</div>

<div class="links">

<button class="btn" onclick="window.location.href='https://google.de'</div>

<div>
© Simon Fischer
</div>

</footer>

</body>
</html>
