<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simon Wetterportal</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050505;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    border-bottom:2px solid white;
}

.banner{
    font-size:48px;
    font-weight:bold;
}

.weather-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    border-radius:10px;
    overflow:hidden;
    border:2px solid white;
}

.card h2{
    text-align:center;
    margin:15px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.section{
    padding:20px;
}

.big-box{
    background:#151515;
    padding:25px;
    border-radius:10px;
    text-align:center;
    border:2px solid white;
}

.big-button{
    background:#000;
    color:white;
    border:2px solid white;
    padding:15px 25px;
    margin:10px;
    cursor:pointer;
    border-radius:8px;
    font-size:18px;
    transition:all .3s ease;
}

.big-button:hover{
    background:#ff7b00;
    border-color:#ff7b00;
}

.links{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.link-btn{
    background:#000;
    color:white;
    text-decoration:none;
    padding:18px;
    text-align:center;
    border-radius:10px;
    border:2px solid white;
    font-weight:bold;
    display:block;
    transition:all .3s ease;
}

.link-btn:hover{
    background:#ff7b00;
    border-color:#ff7b00;
}

footer{
    text-align:center;
    padding:30px;
    border-top:2px solid white;
}

.love{
    font-size:24px;
}

.footer-link{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.footer-link:hover{
    color:#ff7b00;
}

.copy{
    color:#ccc;
    margin-top:10px;
}

@media(max-width:1000px){

.weather-grid{
    grid-template-columns:1fr;
}

.links{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="banner">
Simon Wetterportal
</div>

</header>

<div class="weather-grid">

<div class="card">

<h2>🌧 Regenradar</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&level=surface&overlay=radar&menu=true&message=true&marker=true&calendar=now">
</iframe>

</div>

<div class="card">

<h2>💨 Windkarte</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=6&level=surface&overlay=wind&menu=true&message=true&marker=true&calendar=now">
</iframe>

</div>

<div class="card">

<h2>🌀 Hochs, Tiefs & Isobaren</h2>

<iframe
src="https://embed.windy.com/embed2.html?lat=53.14&lon=8.46&zoom=5&level=surface&overlay=pressure&menu=true&message=true&marker=true">
</iframe>

</div>

</div>

<div class="section">

<div class="big-box">

<h2>🇩🇪 Deutscher Wetterdienst</h2>

<p>DWD-Bodenwetterkarten öffnen</p>

<button
class="big-button"
onclick="window.open('https://www.dwd.de/DE/leistungen/hobbymet_wk_europa/hobbyeuropakarten.html','_blank')">

DWD öffnen

</button>

</div>

</div>

<div class="section">

<div class="big-box">

<h2>🚢 AIS Schiffsverkehr</h2>

<p>Live Schiffsdaten öffnen</p>

<button
class="big-button"
onclick="window.open('https://www.marinetraffic.com','_blank')">

MarineTraffic

</button>

<button
class="big-button"
onclick="window.open('https://www.vesselfinder.com','_blank')">

VesselFinder

</button>

</div>

</div>

<div class="links">

<a class="link-btn"
href="https://www.canada.ca/en/environment-climate-change/services/ice-forecasts-observations/latest-conditions/canadian-sea-concentration-map.html"
target="_blank">
Canada latest ice conditions
</a>

<a class="link-btn" href="https://google.de" target="_blank">
TEXT2
</a>

<a class="link-btn" href="https://google.de" target="_blank">
TEXT3
</a>

<a class="link-btn" href="https://google.de" target="_blank">
TEXT4
</a>

<a class="link-btn" href="https://google.de" target="_blank">
TEXT5
</a>

<a class="link-btn" href="https://google.de" target="_blank">
TEXT6
</a>

</div>

<footer>

<div class="love">
Made with ❤️ by
<a class="footer-link"
href="https://www.instagram.com/thesimonfischer"
target="_blank">
Simon Fischer
</a>
</div>

<div class="copy">
© 2026 Simon Fischer
</div>

</footer>

</body>
</html>
